<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternAI — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
                    colors: { brandPrimary: '#00f0ff', brandSecondary: '#7000ff' }
                }
            }
        }
    </script>
    <style>
        body { background: #030305; color: #fff; overflow-x: hidden; }
        .glass-panel {
            background: rgba(20, 20, 25, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .skeu-input {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); transition: all 0.3s;
        }
        .skeu-input:focus { outline: none; border-color: var(--brandPrimary); box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 10px rgba(0,240,255,0.2); }
        .skeu-btn-primary {
            background: linear-gradient(180deg, #00f0ff 0%, #008ba3 100%); color: #001f25;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.8), inset 0 -4px 8px rgba(0,0,0,0.4), 0 10px 20px rgba(0,240,255,0.3);
            transition: all 0.3s;
        }
        .skeu-btn-primary:hover { transform: translateY(-2px); box-shadow: inset 0 2px 4px rgba(255,255,255,0.8), 0 15px 30px rgba(0,240,255,0.4); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">
    <video class="absolute inset-0 w-full h-full object-cover opacity-20 mix-blend-screen z-[-1]" autoplay loop muted playsinline>
        <source src="/images/10150923-uhd_3840_2160_24fps.mp4" type="video/mp4">
    </video>
    <div class="absolute inset-0 bg-gradient-to-br from-black/80 to-[#7000ff]/20 z-[-1]"></div>

    <div class="w-full max-w-md p-6">
        <div class="flex justify-center mb-8">
            <a href="/" class="flex items-center gap-3">
                <span class="text-3xl filter drop-shadow-[0_0_10px_rgba(0,240,255,0.8)]">🤖</span>
                <span class="font-display font-bold text-3xl">Intern<span class="text-[#00f0ff]">AI</span></span>
            </a>
        </div>

        <div class="glass-panel rounded-3xl p-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#00f0ff] to-[#7000ff]"></div>
            
            <h2 class="text-3xl font-display font-bold mb-2">Welcome Back</h2>
            <p class="text-gray-400 text-sm mb-8">Sign in to continue your career journey.</p>
            
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider">Email Address</label>
                    <input type="email" id="email" required class="w-full skeu-input rounded-xl px-4 py-3 text-white" placeholder="you@example.com">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Password</label>
                        <a href="/forgot-password" class="text-xs text-[#00f0ff] hover:underline">Forgot password?</a>
                    </div>
                    <input type="password" id="password" required class="w-full skeu-input rounded-xl px-4 py-3 text-white" placeholder="••••••••">
                </div>
                
                <div id="error-msg" class="hidden text-red-400 text-sm p-3 rounded-lg bg-red-500/10 border border-red-500/20"></div>
                
                <button type="submit" id="submitBtn" class="w-full skeu-btn-primary py-3.5 rounded-xl font-bold text-lg mt-2 flex justify-center items-center gap-2">
                    Sign In <span class="text-xl">➔</span>
                </button>
            </form>
            
            <div class="mt-8 text-center text-sm text-gray-400">
                Don't have an account? <a href="/register" class="text-white font-bold hover:text-[#00f0ff] transition-colors">Create one</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        gsap.from(".glass-panel", {y: 50, opacity: 0, duration: 1, ease: "power3.out"});
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('error-msg');
            btn.innerHTML = `<span class="animate-spin w-5 h-5 border-2 border-black/20 border-t-black rounded-full inline-block"></span> Authenticating...`;
            btn.disabled = true;
            errorDiv.classList.add('hidden');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('token', data.token);
                    if(data.user && data.user.session_id) {
                        localStorage.setItem('session_id', data.user.session_id);
                    }
                    window.location.href = '/dashboard';
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch(err) {
                errorDiv.innerText = err.message;
                errorDiv.classList.remove('hidden');
                btn.innerHTML = `Sign In <span class="text-xl">➔</span>`;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
